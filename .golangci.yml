version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - misspell
    - gosec
    - bodyclose
    - contextcheck
    - nilerr
    - unparam
    - prealloc
    - makezero

settings:
  revive:
    confidence: 0.8

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/OnYyon/oregon-go-template

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104

  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude:
    default: false
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - path: cmd/.*/main\.go
        linters:
          - unused
  max-issues-per-linter: 0
  max-same-issues: 0
