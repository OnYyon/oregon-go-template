version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gci
    - nolintlint
    - gosec
    - bodyclose
    - contextcheck
    - nilerr
    - unparam
    - prealloc
    - makezero
    - perfsprint
    - gocyclo
    - gocognit
    - funlen
    - maintidx
    - errorlint
    - err113
    - wrapcheck
    - copyloopvar
    - fatcontext
    - spancheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
